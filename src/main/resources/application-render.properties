spring.application.name=backend
server.port=${PORT:8081}

# Database Configuration - converts Render's DATABASE_URL to proper JDBC format
# Render provides: postgresql://user:pass@host/db
# We need: jdbc:postgresql://user:pass@host/db
spring.datasource.url=jdbc:${DATABASE_URL:h2:file:./data/testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.driver-class-name=${DATABASE_DRIVER:org.h2.Driver}

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
# Dynamic dialect: PostgreSQL when DATABASE_URL is provided, H2 otherwise
spring.jpa.properties.hibernate.dialect=${DATABASE_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.properties.hibernate.format_sql=true

# SQL Initialization
spring.sql.init.mode=ALWAYS
spring.sql.init.encoding=UTF-8
spring.jpa.defer-datasource-initialization=true

# Logging
logging.level.org.hibernate=WARN
logging.level.org.springframework.web=INFO

# Mail Configuration
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
